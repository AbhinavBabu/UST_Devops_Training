apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv1
  labels:
    type: fs
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /data/pv1
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv2
  labels:
    type: sl
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  hostPath:
    path: /data/pv2
