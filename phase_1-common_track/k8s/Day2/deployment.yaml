apiVersion: apps/v1
kind: Deployment
metadata:
  name: testdeployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: myweb

  template:
    metadata:
      name: nginxdeploy
      labels:
        app: myweb
    spec:
      containers:
        - name: nginxdeploy
          image: abhinavbabu33/demo:2
          ports:
            - containerPort: 80
