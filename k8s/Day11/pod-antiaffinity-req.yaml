apiVersion: v1
kind: Pod
metadata:
  name: pod-anti-affinity-required-demo
  namespace: scheduling-demo
  labels:
    app: nginx-aa
spec:
  containers:
  - name: nginx
    image: nginx

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchLabels:
            app: nginx-aa
        topologyKey: kubernetes.io/hostname
