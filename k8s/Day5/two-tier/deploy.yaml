apiVersion: apps/v1
kind: Deployment

metadata:
  name: twotier-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: twotier-app

  template:
    metadata:
      labels:
        app: twotier-app

    spec:
      restartPolicy: Always

      containers:
      - name: twotierappcont
        image: neerajbala/monoapp-2tier

        ports:
        - containerPort: 8080

        env:
        - name: DB_HOST
          value: mysql-service

        - name: DB_NAME
          value: my_db

        - name: DB_USER
          value: appuser

        - name: DB_PASSWORD
          value: "password"

        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 40
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 5
